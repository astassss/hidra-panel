<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H.I.D.R.A Intelligence Terminal</title>

<style>

body{
margin:0;
background:#07030d;
font-family:monospace;
color:#b84dff;
overflow:hidden;
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(184,77,255,0.07) 1px, transparent 1px),
linear-gradient(90deg, rgba(184,77,255,0.07) 1px, transparent 1px);
background-size:40px 40px;
z-index:-1;
}

.header{
padding:15px;
border-bottom:1px solid #b84dff;
color:#b84dff;
text-shadow:0 0 10px #b84dff;
letter-spacing:2px;
font-size:18px;
}

.terminal{
height:calc(100vh - 60px);
padding:20px;
overflow-y:auto;
font-size:14px;
}

.terminal div{
margin:2px 0;
text-shadow:0 0 6px #b84dff;
}

::-webkit-scrollbar{
width:6px;
}

::-webkit-scrollbar-thumb{
background:#b84dff;
}

</style>
</head>

<body>
