<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>H.I.D.R.A Intelligence System</title>

<style>

body{
margin:0;
background:#040009;
color:#b84dff;
font-family:monospace;
overflow:hidden;
text-align:center;
}

/* GRID BACKGROUND */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(180,70,255,0.08) 1px, transparent 1px),
linear-gradient(90deg, rgba(180,70,255,0.08) 1px, transparent 1px);
background-size:40px 40px;
z-index:-1;
}

/* LOGO */

.logo{
width:230px;
margin-top:30px;

filter:
hue-rotate(260deg)
saturate(2)
drop-shadow(0 0 20px #b84dff);

animation:
rotate 35s linear infinite,
pulse 3s ease-in-out infinite;
}

@keyframes rotate{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

@keyframes pulse{
0%{filter:hue-rotate(260deg) saturate(2) drop-shadow(0 0 10px #b84dff);}
50%{filter:hue-rotate(260deg) saturate(2) drop-shadow(0 0 40px #b84dff);}
100%{filter:hue-rotate(260deg) saturate(2) drop-shadow(0 0 10px #b84dff);}
}

/* HEADER */

.header{
font-size:22px;
margin-top:10px;
letter-spacing:4px;
text-shadow:0 0 10px #b84dff;
}

/* TERMINAL */

#terminal{

width:90%;
max-width:900px;

height:45vh;

margin:25px auto;

border:1px solid #b84dff;

padding:20px;

text-align:left;

overflow:auto;

box-shadow:0 0 25px #6a00ff;

}

/* COMMAND BAR */

.command{

position:fixed;

bottom:0;

width:100%;

border-top:1px solid #b84dff;

background:#040009;

padding:10px;

}

input{

width:90%;

background:none;

border:none;

color:#b84dff;

font-family:monospace;

font-size:16px;

outline:none;

}

/* ALERT */

.alert{

color:#ff4df0;

animation:blink 1s infinite;

}

@keyframes blink{

0%{opacity:1}
50%{opacity:0.3}
100%{opacity:1}

}

</style>

</head>

<body>

<img src="hydra.png" class="logo">

<div class="header">
H.I.D.R.A INTELLIGENCE NETWORK
</div>

<div id="terminal"></div>

<div class="command">
> <input id="cmd" placeholder="enter command">
</div>

<script>

const terminal = document.getElementById("terminal")

const intro = `
> Booting H.I.D.R.A Network...

> Connecting to global surveillance grid...

> Target company detected:

CYBER LIFE PHARMACEUTICALS

> Location of main laboratory:

Boston Biotech Laboratory
Massachusetts, USA

> Downloading experiment database...

CL-01 John Carter
CL-02 Emily Johnson
CL-03 Michael Thompson
CL-04 Sarah Miller
CL-05 David Anderson
CL-06 Christopher Walker
CL-07 Jessica Taylor
CL-08 Daniel Moore

>>> PRIORITY TARGET <<<

ALBERT WESKER

> Awaiting command...
`

let i=0

function type(){

if(i<intro.length){

terminal.innerHTML+=intro.charAt(i)

i++

setTimeout(type,18)

}

}

type()

const cmd=document.getElementById("cmd")

cmd.addEventListener("keydown",function(e){

if(e.key==="Enter"){

const value=cmd.value.toLowerCase()

terminal.innerHTML+="\n\n> "+value+"\n"

if(value==="scan"){

terminal.innerHTML+="Scanning Cyber Life systems...\nFacility located: Boston Biotech Laboratory"

}

else if(value==="locate wesker"){

terminal.innerHTML+="<span class='alert'>ALERT: ALBERT WESKER SIGNAL DETECTED</span>\nStatus: Unknown\nDeploying H.I.D.R.A agents"

}

else if(value==="experiments"){

terminal.innerHTML+=`
Experiment Files:

CL-01 John Carter
CL-02 Emily Johnson
CL-03 Michael Thompson
CL-04 Sarah Miller
CL-05 David Anderson
CL-06 Christopher Walker
CL-07 Jessica Taylor
CL-08 Daniel Moore

CL-11 ALBERT WESKER
STATUS: CLASSIFIED
`

}

else if(value==="cyberlife"){

terminal.innerHTML+=`
Cyber Life facilities detected:

Boston
Tokyo
Zurich
Berlin
`

}

else if(value==="hydra"){

terminal.innerHTML+="HAIL HYDRA"

}

else{

terminal.innerHTML+="Unknown command"

}

terminal.scrollTop=terminal.scrollHeight

cmd.value=""

}

})

</script>

</body>
</html>
