<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>H.I.D.R.A Terminal</title>

<style>

body{
margin:0;
background:#05010a;
color:#c66bff;
font-family:monospace;
text-align:center;
overflow:hidden;
}

/* GRID BACKGROUND */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(190,120,255,0.06) 1px, transparent 1px),
linear-gradient(90deg, rgba(190,120,255,0.06) 1px, transparent 1px);
background-size:40px 40px;
z-index:-1;
}

/* LOGO CONTAINER */

.logo-container{
position:relative;
width:240px;
margin:auto;
margin-top:40px;
}

/* HYDRA LOGO */

.logo{

width:220px;

position:relative;

z-index:2;

filter:
hue-rotate(260deg)
saturate(2)
drop-shadow(0 0 20px #a64dff);

animation:
pulse 4s ease-in-out infinite;

}

/* TENTACLES */

.tentacle{

position:absolute;

width:6px;

height:120px;

background:linear-gradient(#a64dff,#5e00ff);

border-radius:10px;

left:50%;

top:50%;

transform-origin:top;

box-shadow:0 0 15px #a64dff;

animation:wave 6s ease-in-out infinite;

}

/* CREATE 8 TENTACLES */

.t1{ transform:rotate(0deg) translateY(-20px); }
.t2{ transform:rotate(45deg) translateY(-20px); }
.t3{ transform:rotate(90deg) translateY(-20px); }
.t4{ transform:rotate(135deg) translateY(-20px); }
.t5{ transform:rotate(180deg) translateY(-20px); }
.t6{ transform:rotate(225deg) translateY(-20px); }
.t7{ transform:rotate(270deg) translateY(-20px); }
.t8{ transform:rotate(315deg) translateY(-20px); }

/* WAVE ANIMATION */

@keyframes wave{

0%{ transform:rotate(var(--r)) translateY(-20px) rotate(0deg); }

50%{ transform:rotate(var(--r)) translateY(-20px) rotate(10deg); }

100%{ transform:rotate(var(--r)) translateY(-20px) rotate(0deg); }

}

/* LOGO GLOW */

@keyframes pulse{

0%{filter:hue-rotate(260deg) saturate(2) drop-shadow(0 0 10px #a64dff);}
50%{filter:hue-rotate(260deg) saturate(2) drop-shadow(0 0 40px #a64dff);}
100%{filter:hue-rotate(260deg) saturate(2) drop-shadow(0 0 10px #a64dff);}

}

/* HEADER */

.header{

margin-top:15px;

font-size:22px;

letter-spacing:4px;

text-shadow:0 0 10px #b84dff;

}

/* TERMINAL */

#terminal{

width:90%;
max-width:900px;
height:45vh;

margin:30px auto;

text-align:left;

border:1px solid #a64dff;

padding:20px;

overflow:auto;

box-shadow:0 0 20px #6a00ff;

}

/* COMMAND BAR */

.command{

position:fixed;
bottom:0;
width:100%;

background:#05010a;

border-top:1px solid #a64dff;

padding:10px;

}

input{

width:90%;
background:none;
border:none;
color:#c66bff;
font-family:monospace;
font-size:16px;
outline:none;

}

.alert{

color:#ff5cff;
animation:blink 1s infinite;

}

@keyframes blink{

0%{opacity:1}
50%{opacity:0.3}
100%{opacity:1}

}

</style>

</head>

<body>

<div class="logo-container">

<div class="tentacle t1"></div>
<div class="tentacle t2"></div>
<div class="tentacle t3"></div>
<div class="tentacle t4"></div>
<div class="tentacle t5"></div>
<div class="tentacle t6"></div>
<div class="tentacle t7"></div>
<div class="tentacle t8"></div>

<img src="hydra.png" class="logo">

</div>

<div class="header">
H.I.D.R.A INTELLIGENCE NETWORK
</div>

<div id="terminal"></div>

<div class="command">
> <input id="cmd" placeholder="type command">
</div>

<script>

const terminal = document.getElementById("terminal")

const intro = `
> Booting H.I.D.R.A network...
> Establishing encrypted global connection...

> TARGET DETECTED
CYBER LIFE PHARMACEUTICALS

> Known facility:
Boston Biotech Laboratory - Massachusetts

> Accessing experiment database...

CL-01 John Carter
CL-02 Emily Johnson
CL-03 Michael Thompson
CL-04 Sarah Miller
CL-05 David Anderson
CL-06 Christopher Walker
CL-07 Jessica Taylor

>>> PRIORITY TARGET <<<

ALBERT WESKER

> Awaiting command...
`

let i = 0

function type(){

if(i < intro.length){

terminal.innerHTML += intro.charAt(i)

i++

setTimeout(type,20)

}

}

type()

const cmd = document.getElementById("cmd")

cmd.addEventListener("keydown",function(e){

if(e.key==="Enter"){

const value = cmd.value.toLowerCase()

terminal.innerHTML += "\n\n> "+value+"\n"

if(value==="scan"){

terminal.innerHTML += "Scanning Cyber Life network...\nFacility detected: Boston Biotech Laboratory"

}

else if(value==="locate wesker"){

terminal.innerHTML += "<span class='alert'>ALERT: Albert Wesker signal detected</span>\nLocation: Unknown\nH.I.D.R.A agents deployed"

}

else if(value==="hydra"){

terminal.innerHTML += "HAIL HYDRA"

}

else{

terminal.innerHTML += "Unknown command"

}

terminal.scrollTop = terminal.scrollHeight

cmd.value=""

}

})

</script>

</body>
</html>
