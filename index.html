<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H.I.D.R.A Intelligence Terminal</title>

<style>
body{
margin:0;
background:#07030d;
font-family:monospace;
color:#b84dff;
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(184,77,255,0.07) 1px, transparent 1px),
linear-gradient(90deg, rgba(184,77,255,0.07) 1px, transparent 1px);
background-size:40px 40px;
z-index:-1;
}

.header{
padding:15px;
border-bottom:1px solid #b84dff;
color:#b84dff;
text-shadow:0 0 10px #b84dff;
letter-spacing:2px;
font-size:18px;
}

.terminal{
height:calc(100vh - 60px);
padding:20px;
overflow-y:auto;
font-size:14px;
}
</style>
</head>

<body>

<div class="header">
H.I.D.R.A INTELLIGENCE NETWORK
</div>

<div id="terminal" class="terminal"></div>

<script>

const terminal = document.getElementById("terminal");

const lines = [

"> Initializing H.I.D.R.A intelligence terminal...",
"> Establishing encrypted network...",
"> Searching global databases...",
"",
"> TARGET ORGANIZATION DETECTED",
"> CYBER LIFE PHARMACEUTICALS",
"",
"> Known Research Facility:",
"> Boston Biotech Laboratory - Massachusetts",
"",
"> Accessing experiment database...",
"",
"> Experiment CL-01: JOHN CARTER",
"> Status: Missing",
"",
"> Experiment CL-02: EMILY JOHNSON",
"> Status: Unknown",
"",
"> Experiment CL-03: MICHAEL THOMPSON",
"> Status: Classified",
"",
"> Experiment CL-04: SARAH MILLER",
"> Status: Containment unstable",
"",
"> Experiment CL-05: DAVID ANDERSON",
"> Status: Active subject",
"",
"> HIGH PRIORITY TARGET",
"",
"> Experiment CL-11: ALBERT WESKER",
"> Status: PRIORITY TARGET",
"",
"> Searching Cyber Life facilities...",
"",
"> Boston Biotech Laboratory detected",
"",
"> Deploying H.I.D.R.A agents...",
"",
"> Warning: Cyber Life security trace detected",
"",
"> Disconnecting from network..."

];

let index = 0;

function typeLine(){

if(index < lines.length){

const line = document.createElement("div");
line.textContent = lines[index];

terminal.appendChild(line);

terminal.scrollTop = terminal.scrollHeight;

index++;

setTimeout(typeLine,350);

}

}

typeLine();

</script>

</body>
</html>
