<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H.I.D.R.A Intelligence Terminal</title>

<style>
body{
margin:0;
background:#07030d;
font-family:monospace;
color:#b84dff;
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(184,77,255,0.07) 1px, transparent 1px),
linear-gradient(90deg, rgba(184,77,255,0.07) 1px, transparent 1px);
background-size:40px 40px;
z-index:-1;
}

.header{
padding:15px;
border-bottom:1px solid #b84dff;
text-shadow:0 0 10px #b84dff;
letter-spacing:2px;
font-size:18px;
}

#terminal{
padding:20px;
height:calc(100vh - 60px);
overflow:auto;
white-space:pre-line;
}
</style>
</head>

<body>

<div class="header">
H.I.D.R.A INTELLIGENCE NETWORK
</div>

<div id="terminal"></div>

<script>

const text = `
> Initializing H.I.D.R.A intelligence terminal...
> Establishing encrypted global network...

> TARGET DETECTED
> CYBER LIFE PHARMACEUTICALS

> Known facility:
> Boston Biotech Laboratory

> Accessing experiment database...

> Experiment CL-01: JOHN CARTER
Status: Missing

> Experiment CL-02: EMILY JOHNSON
Status: Unknown

> Experiment CL-03: MICHAEL THOMPSON
Status: Classified

> Experiment CL-04: SARAH MILLER
Status: Containment unstable

> Experiment CL-05: DAVID ANDERSON
Status: Active subject

> HIGH PRIORITY TARGET

> Experiment CL-11: ALBERT WESKER
Status: PRIORITY TARGET

> Searching Cyber Life facilities...
> Boston Biotech Laboratory located

> Deploying H.I.D.R.A agents...

> Warning: Cyber Life security trace detected

> Disconnecting...
`;

let i = 0;
const speed = 25;

function typeWriter(){
if(i < text.length){
document.getElementById("terminal").innerHTML += text.charAt(i);
i++;
setTimeout(typeWriter, speed);
}
}

typeWriter();

</script>

</body>
</html>
