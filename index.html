<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H.I.D.R.A Terminal</title>

<style>

body{
margin:0;
background:#07030d;
color:#c66bff;
font-family:monospace;
overflow:hidden;
}

/* GRID */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background-image:
linear-gradient(rgba(198,107,255,0.08) 1px, transparent 1px),
linear-gradient(90deg, rgba(198,107,255,0.08) 1px, transparent 1px);
background-size:40px 40px;
z-index:-1;
}

/* HEADER */

.header{
padding:15px;
border-bottom:1px solid #c66bff;
text-shadow:0 0 10px #c66bff;
letter-spacing:3px;
font-size:20px;
}

/* TERMINAL */

#terminal{
padding:20px;
height:80vh;
overflow:auto;
white-space:pre-line;
}

/* COMMAND LINE */

.command{
position:fixed;
bottom:0;
width:100%;
padding:10px;
border-top:1px solid #c66bff;
background:#07030d;
}

input{
width:100%;
background:none;
border:none;
color:#c66bff;
font-family:monospace;
font-size:16px;
outline:none;
}

/* ALERT */

.alert{
color:#ff3df5;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0.3}
100%{opacity:1}
}

</style>
</head>

<body>

<div class="header">
H.I.D.R.A INTELLIGENCE NETWORK
</div>

<div id="terminal"></div>

<div class="command">
> <input id="cmd" placeholder="type command...">
</div>

<script>

const terminal = document.getElementById("terminal")

const intro = `
> Booting H.I.D.R.A intelligence network...
> Establishing encrypted global connection...

> Target detected:
CYBER LIFE PHARMACEUTICALS

> Known facility:
Boston Biotech Laboratory - Massachusetts

> Accessing experiment database...

Experiment CL-01: John Carter
Experiment CL-02: Emily Johnson
Experiment CL-03: Michael Thompson
Experiment CL-04: Sarah Miller
Experiment CL-05: David Anderson

>>> PRIORITY TARGET <<<

ALBERT WESKER

> Awaiting command...
`

let i = 0

function type(){
if(i < intro.length){
terminal.innerHTML += intro.charAt(i)
i++
setTimeout(type,20)
}
}

type()

const cmd = document.getElementById("cmd")

cmd.addEventListener("keydown",function(e){

if(e.key==="Enter"){

const value = cmd.value.toLowerCase()

terminal.innerHTML += "\n\n> "+value+"\n"

if(value==="scan"){
terminal.innerHTML += "Scanning Cyber Life network...\nFacility found: Boston Biotech Laboratory"
}

else if(value==="locate wesker"){
terminal.innerHTML += "<span class='alert'>ALERT: Albert Wesker signal detected</span>\nLocation: Unknown\nH.I.D.R.A agents deployed"
}

else if(value==="search cyberlife"){
terminal.innerHTML += "Cyber Life laboratories:\n- Boston\n- Zurich\n- Tokyo"
}

else{
terminal.innerHTML += "Unknown command"
}

terminal.scrollTop = terminal.scrollHeight
cmd.value=""

}

})

</script>

</body>
</html>
